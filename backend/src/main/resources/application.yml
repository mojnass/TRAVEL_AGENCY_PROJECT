server:
  port: 8080

spring:
  application:
    name: travel-agency-backend
  config:
    import: optional:file:.env[.properties]

app:
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  jwt:
    issuer: patronus-travel
    # Replace in production with an environment variable.
    secret: "change-this-local-development-secret-that-is-at-least-32-bytes"
    expiration-minutes: 720
  supabase:
    url: ${SUPABASE_URL:}
    anon-key: ${SUPABASE_ANON_KEY:}
    db-url: ${SUPABASE_DB_URL:}
    db-user: ${SUPABASE_DB_USER:}
    db-password: ${SUPABASE_DB_PASSWORD:}
